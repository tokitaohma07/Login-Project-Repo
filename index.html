<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fantasy Login</title>
</head>
<body style="background: url('https://source.unsplash.com/1600x900/?fantasy,castle') no-repeat center center/cover; font-family: 'Papyrus', fantasy; text-align: center;">



    <div style="width: 350px; margin: 100px auto; padding: 20px; background: rgba(0,0,0,0.7); border-radius: 10px; box-shadow: 0px 0px 15px gold; color: white;">
        <h2 style="color: gold; text-shadow: 2px 2px 5px white;">🔮 Welcome, Adventurer! 🔮</h2>
        <form>
            <label style="display: block; margin-bottom: 8px;">Username</label>
            <input type="text" style="width: 90%; padding: 10px; border: 2px solid white; background: rgba(255,255,255,0.2); color: white; border-radius: 5px; text-align: center;">
            
            <label style="display: block; margin: 15px 0 8px;">Password</label>
            <input type="password" style="width: 90%; padding: 10px; border: 2px solid gold; background: rgba(255,255,255,0.2); color: white; border-radius: 5px; text-align: center;">
            
            <button style="margin-top: 20px; padding: 10px 20px; background: gold; border: none; border-radius: 5px; color: black; font-weight: bold; cursor: pointer; box-shadow: 0px 0px 10px gold;">
                Enter the Realm
            </button>
        </form>
    </div>

</body>
</html>
